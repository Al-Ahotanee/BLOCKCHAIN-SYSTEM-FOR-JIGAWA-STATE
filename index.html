<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Management Dashboard — Jigawa State Asset Registry</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Chart.js for beautiful graph visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* Professional typography system */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* State Theme Variables */
            --primary-green: #008751;
            --light-green: #10B981;
            --dark-green: #005C37;
            --primary-gold: #D4AF37;
            --light-gold: #FDE047;
            
            /* Sidebar Settings */
            --sidebar-width: 260px;
            
            /* Action Colors */
            --alert-red: #DC2626;
            --info-blue: #1D4ED8;
            --accent-purple: #7C3AED;
            
            /* Base Interface Colors */
            --bg-canvas: #F8FAFC;
            --surface-color: #FFFFFF;
            --slate-50: #F9FAFB;
            --slate-100: #F1F5F9;
            --slate-200: #E2E8F0;
            --slate-500: #64748B;
            --slate-700: #334155;
            --slate-900: #0F172A;
            
            /* Elevation & Shadows */
            --shadow-subtle: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-medium: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-elevated: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-canvas);
            color: var(--slate-900);
        }

        /* ── Application Layout ── */
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        
        .sidebar-navigation {
            width: var(--sidebar-width);
            background: var(--slate-900);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }
        
        .main-workspace {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── Sidebar Component Styles ── */
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.2);
        }
        
        .sidebar-logo-group {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .sidebar-icon-box {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--surface-color);
            flex-shrink: 0;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
        }
        
        .sidebar-title {
            color: var(--surface-color);
            font-weight: 800;
            font-size: 1.05rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        
        .sidebar-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 2px;
        }

        .navigation-links {
            padding: 1.5rem 0;
            flex: 1;
        }
        
        .navigation-category-label {
            padding: 0.5rem 1.5rem;
            font-size: 0.7rem;
            color: var(--slate-500);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }
        
        .nav-button-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            border-radius: 0;
            position: relative;
        }
        
        .nav-button-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--surface-color);
        }
        
        .nav-button-item.is-active {
            background: rgba(0, 135, 81, 0.15);
            color: var(--surface-color);
        }
        
        .nav-button-item.is-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-green);
            border-radius: 0 4px 4px 0;
        }
        
        .nav-button-icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
            opacity: 0.8;
        }
        
        .nav-button-item.is-active .nav-button-icon {
            color: var(--light-green);
            opacity: 1;
        }
        
        .alert-indicator-badge {
            margin-left: auto;
            background: var(--alert-red);
            color: var(--surface-color);
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 99px;
            font-weight: 700;
        }

        .user-profile-section {
            padding: 1.2rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(0, 0, 0, 0.1);
        }
        
        .user-avatar-circle {
            width: 38px;
            height: 38px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--surface-color);
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .user-name-text {
            color: var(--surface-color);
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .user-role-text {
            color: var(--slate-500);
            font-size: 0.75rem;
            text-transform: capitalize;
        }
        
        .btn-system-logout {
            margin-left: auto;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--slate-500);
            transition: color 0.2s ease;
        }
        
        .btn-system-logout:hover {
            color: var(--surface-color);
        }

        /* ── Topbar Component ── */
        .workspace-topbar {
            background: var(--surface-color);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--slate-200);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        .workspace-topbar h2 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        
        .topbar-control-group {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        
        .system-health-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            border-radius: 99px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: #166534;
        }
        
        .pulse-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22C55E;
            animation: animatePulse 1.5s infinite;
        }
        
        @keyframes animatePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Main Content Area ── */
        .content-canvas {
            padding: 2rem;
            flex: 1;
        }

        /* ── Statistic Cards ── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .metric-card {
            background: var(--surface-color);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--slate-200);
            border-top: 4px solid transparent;
            box-shadow: var(--shadow-subtle);
            transition: transform 0.2s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
        }
        
        .metric-card.theme-green { border-top-color: var(--primary-green); }
        .metric-card.theme-gold { border-top-color: var(--primary-gold); }
        .metric-card.theme-blue { border-top-color: var(--info-blue); }
        .metric-card.theme-purple { border-top-color: var(--accent-purple); }

        .metric-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .metric-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-green .metric-icon-box { background: #F0FDF4; color: var(--primary-green); }
        .theme-gold .metric-icon-box { background: #FEFCE8; color: #CA8A04; }
        .theme-blue .metric-icon-box { background: #EFF6FF; color: var(--info-blue); }
        .theme-purple .metric-icon-box { background: #F5F3FF; color: var(--accent-purple); }

        .metric-main-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--slate-900);
            line-height: 1;
        }
        
        .metric-sub-label {
            font-size: 0.85rem;
            color: var(--slate-500);
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* ── Standard Panel Cards ── */
        .panel-card {
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px solid var(--slate-200);
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-subtle);
        }
        
        .panel-card-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--slate-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--slate-50);
        }
        
        .panel-card-header h3 {
            font-size: 1.05rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate-900);
        }
        
        .panel-card-body {
            padding: 1.5rem;
        }

        /* Dual Column Layout */
        .layout-grid-dual {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media(max-width: 900px) {
            .layout-grid-dual {
                grid-template-columns: 1fr;
            }
        }

        /* ── Data Tables ── */
        .table-responsive-wrapper {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        .data-table th {
            background: var(--slate-50);
            padding: 1rem 1.2rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
            border-bottom: 2px solid var(--slate-200);
        }
        
        .data-table td {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--slate-100);
            vertical-align: middle;
            color: var(--slate-700);
        }
        
        .data-table tr:hover td {
            background: var(--slate-50);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        
        .status-badge.type-active { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
        .status-badge.type-transferred { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }
        .status-badge.type-inactive { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
        .status-badge.type-disposed { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
        .status-badge.type-maintenance { background: #F5F3FF; color: #5B21B6; border: 1px solid #DDD6FE; }

        /* ── Action Buttons ── */
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-theme-green { 
            background: var(--primary-green); 
            color: var(--surface-color); 
            box-shadow: 0 4px 10px rgba(0, 135, 81, 0.2); 
        }
        
        .btn-theme-green:hover { 
            background: var(--dark-green); 
        }
        
        .btn-theme-gold { 
            background: var(--primary-gold); 
            color: var(--surface-color); 
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2); 
        }
        
        .btn-theme-gold:hover { 
            background: #B49020; 
        }
        
        .btn-theme-outline { 
            background: var(--surface-color); 
            border: 1px solid var(--slate-200); 
            color: var(--slate-700); 
        }
        
        .btn-theme-outline:hover { 
            background: var(--slate-50); 
            border-color: var(--slate-500); 
        }
        
        .btn-small-size { 
            padding: 0.4rem 0.8rem; 
            font-size: 0.8rem; 
        }
        
        .btn-icon-only { 
            padding: 0.4rem; 
            border-radius: 8px; 
        }

        /* ── Form Interactions ── */
        .input-grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }
        
        @media(max-width: 700px) {
            .input-grid-layout {
                grid-template-columns: 1fr;
            }
        }
        
        .input-field-group {
            margin-bottom: 0;
        }
        
        .input-field-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--slate-700);
            margin-bottom: 0.5rem;
        }
        
        .input-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--slate-200);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
            background: var(--slate-50);
            color: var(--slate-900);
        }
        
        .input-control:focus {
            border-color: var(--primary-green);
            background: var(--surface-color);
            box-shadow: 0 0 0 4px rgba(0, 135, 81, 0.1);
        }
        
        .input-field-group.span-full {
            grid-column: 1 / -1;
        }

        /* ── Data Filter Bar ── */
        .filter-controls-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .filter-input {
            padding: 0.7rem 1rem;
            border: 1px solid var(--slate-200);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            background: var(--surface-color);
            color: var(--slate-900);
            font-weight: 500;
        }
        
        .filter-input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(0, 135, 81, 0.1);
        }
        
        .filter-search-box {
            flex: 1;
            min-width: 200px;
        }

        /* ── Blockchain Explorer Blocks ── */
        .ledger-block-item {
            border: 1px solid var(--slate-200);
            border-radius: 12px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
            background: var(--surface-color);
        }
        
        .ledger-block-item:hover {
            border-color: var(--primary-green);
            box-shadow: 0 4px 15px rgba(0, 135, 81, 0.08);
        }
        
        .block-header-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }
        
        .block-index-pill {
            background: var(--primary-green);
            color: var(--surface-color);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .block-hash-text {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--slate-500);
            word-break: break-all;
            margin-top: 0.5rem;
            background: var(--slate-50);
            padding: 0.5rem;
            border-radius: 6px;
        }
        
        .block-metadata {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: var(--slate-500);
            margin-top: 0.8rem;
            font-weight: 500;
        }

        /* ── Modal Popups ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal-window {
            background: var(--surface-color);
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-elevated);
        }
        
        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--slate-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--surface-color);
            z-index: 1;
        }
        
        .modal-header h3 {
            font-size: 1.15rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate-900);
        }
        
        .btn-modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--slate-500);
            transition: all 0.2s ease;
            padding: 0.5rem;
            border-radius: 8px;
        }
        
        .btn-modal-close:hover {
            color: var(--slate-900);
            background: var(--slate-100);
        }
        
        .modal-content-area {
            padding: 1.5rem;
        }

        /* ── System Notifications ── */
        .notification-tray {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .toast-message {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 300px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: animateSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes animateSlideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast-message.toast-success { background: #166534; color: var(--surface-color); }
        .toast-message.toast-error { background: #B91C1C; color: var(--surface-color); }
        .toast-message.toast-info { background: #1E40AF; color: var(--surface-color); }

        .spinner-animation {
            animation: rotateSpinner 1s linear infinite;
        }
        
        @keyframes rotateSpinner {
            to { transform: rotate(360deg); }
        }
        
        .data-loading-state {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            color: var(--slate-500);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="react-application-root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const FLASK_API_BASE = 'http://localhost:5000/api';

        // ── Security & Authentication API ────────────────────────────
        function fetchJwtToken() {
            return localStorage.getItem('jigawa_token') || '';
        }

        function fetchUserData() {
            try {
                const userDataText = localStorage.getItem('jigawa_user');
                return JSON.parse(userDataText || '{}');
            } catch (parsingError) {
                return {};
            }
        }

        async function performApiRequest(endpointPath, httpMethod = 'GET', requestBody = null) {
            const fetchConfig = {
                method: httpMethod,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + fetchJwtToken()
                }
            };
            
            if (requestBody) {
                fetchConfig.body = JSON.stringify(requestBody);
            }
            
            const serverResponse = await fetch(FLASK_API_BASE + endpointPath, fetchConfig);
            
            if (serverResponse.status === 401) {
                // Token has expired or is invalid. Redirect to login.
                localStorage.clear();
                window.location.href = '/';
                return null;
            }
            
            return serverResponse.json();
        }

        // ── Formatting Service Functions ──────────────────────────────
        function formatNaira(numericalValue) {
            return 'NGN ' + Number(numericalValue || 0).toLocaleString('en-NG', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function formatDisplayDate(dateValue) {
            if (!dateValue) return '-';
            return new Date(dateValue).toLocaleDateString('en-NG', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
        }

        function formatHashPreview(hashString) {
            if (!hashString) return '-';
            return hashString.substring(0, 8) + '…' + hashString.substring(hashString.length - 8);
        }

        function formatDisplayTimestamp(unixOrIsoTimestamp) {
            if (!unixOrIsoTimestamp) return '-';
            const parsedTime = typeof unixOrIsoTimestamp === 'number' 
                ? unixOrIsoTimestamp * 1000 
                : unixOrIsoTimestamp;
            return new Date(parsedTime).toLocaleString('en-NG');
        }

        // Implementation of Chart.js wrapping inside a React component
        function VisualizationChart({ dataset, valueProperty, labelProperty, chartTitle, barColor }) {
            const canvasElementRef = useRef(null);
            const chartInstanceRef = useRef(null);

            useEffect(() => {
                if (!canvasElementRef.current || !dataset || dataset.length === 0) return;
                
                // Clear any existing chart to prevent rendering glitches
                if (chartInstanceRef.current) {
                    chartInstanceRef.current.destroy();
                }

                const renderingContext = canvasElementRef.current.getContext('2d');
                
                chartInstanceRef.current = new Chart(renderingContext, {
                    type: 'bar',
                    data: {
                        labels: dataset.map(item => item[labelProperty]),
                        datasets: [{
                            label: chartTitle,
                            data: dataset.map(item => item[valueProperty]),
                            backgroundColor: barColor || '#008751',
                            borderRadius: 6,
                            barPercentage: 0.6
                        }]
                    },
                    options: {
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { 
                            legend: { display: false } 
                        },
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                grid: { borderDash: [4, 4], color: '#E2E8F0' }, 
                                ticks: { stepSize: 1 } 
                            },
                            x: { 
                                grid: { display: false } 
                            }
                        }
                    }
                });
                
                // Cleanup routine
                return () => { 
                    if (chartInstanceRef.current) {
                        chartInstanceRef.current.destroy(); 
                    }
                }
            }, [dataset, valueProperty, labelProperty, chartTitle, barColor]);

            if (!dataset || dataset.length === 0) {
                return (
                    <div style={{ color: '#94A3B8', fontSize: '0.9rem', padding: '2rem 0', textAlign: 'center' }}>
                        Adequate data is not available to render this visualization.
                    </div>
                );
            }
            
            return (
                <div style={{ height: '280px', width: '100%', position: 'relative' }}>
                    <canvas ref={canvasElementRef}></canvas>
                </div>
            );
        }

        // ── DIALOG COMPONENT: Asset Transfer ────────────────────────
        function ComponentModalTransfer({ referencedAsset, closeAction, successAction, triggerToast }) {
            const [transferInputs, setTransferInputs] = useState({
                from_owner: referencedAsset.owner,
                to_owner: '',
                reason: ''
            });
            const [isTransferring, setIsTransferring] = useState(false);
            
            const processTransferChange = (keyIdentifier) => (eventElement) => {
                setTransferInputs(previousInputs => ({ ...previousInputs, [keyIdentifier]: eventElement.target.value }));
            };

            async function executeTransferContract() {
                if (!transferInputs.to_owner || !transferInputs.reason) {
                    triggerToast('Missing mandatory transfer rationale or destination.', 'toast-error', 'alert-circle');
                    return;
                }
                
                setIsTransferring(true);
                try {
                    const transferResponse = await performApiRequest('/assets/transfer', 'POST', { ...transferInputs, asset_id: referencedAsset.asset_id });
                    if (transferResponse?.success) {

                    const diagnosticReport = await performApiRequest('/blockchain/validate');

        function RouteReports({ triggerToast, currentUserContext }) {
            const [securityLogs, setSecurityLogs] = useState([]);
            const [isProcessingLogs, setIsProcessingLogs] = useState(true);

            useEffect(() => {
                if (currentUserContext.role === 'admin' || currentUserContext.role === 'auditor') {
                    const gatherAuditTrails = async () => {
                        setIsProcessingLogs(true);
                        try {
                            const internalData = await performApiRequest('/reports/audit-log');
                            setSecurityLogs(internalData?.logs || []);
                        } catch (requestFailure) {
                            console.error("Retrieval Failure - Logs:", requestFailure);
                        } finally {
                            setIsProcessingLogs(false);
                        }
                    };
                    gatherAuditTrails();
                } else {
                    setIsProcessingLogs(false);
                }
            }, [currentUserContext.role]);

            async function triggerComprehensiveExport() {
                const userAuthToken = fetchJwtToken();
                try {
                    const documentResponse = await fetch(FLASK_API_BASE + '/reports/export', {
                        headers: { Authorization: 'Bearer ' + userAuthToken }
                    });
                    
                    if (!documentResponse.ok) {
                        triggerToast('Compilation of output file failed at source.', 'toast-error', 'alert-circle');
                        return;
                    }
                    
                    const blobStream = await documentResponse.blob();
                    const objectLocatorUrl = URL.createObjectURL(blobStream);
                    
                    const hiddenAnchor = document.createElement('a');
                    hiddenAnchor.href = objectLocatorUrl;
                    hiddenAnchor.download = 'jigawa_state_official_report.json';
                    hiddenAnchor.click();
                    
                    triggerToast('Complete system ledger has been verified and downloaded.', 'toast-success', 'download');
                } catch (ioError) {
                    console.error("Export System Failure:", ioError);
                    triggerToast('Data structuring interrupted. Cannot generate file.', 'toast-error', 'alert-circle');
                }
            }

            return (
                <React.Fragment>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1.5rem' }}>
                        <div>
                            <h2 style={{ fontSize: '1.3rem', fontWeight: 800, color: '#0F172A' }}>Legal Reports & Audit Intelligence</h2>
                            <p style={{ fontSize: '0.9rem', color: '#64748B', marginTop: 4 }}>Uncover comprehensive system trails and secure backups</p>
                        </div>
                        <button className="btn-action btn-theme-gold" onClick={triggerComprehensiveExport}>
                            <LucideIcon iconName="download" iconSize={18} /> Compile Full Master Export
                        </button>
                    </div>

                    {(currentUserContext.role === 'admin' || currentUserContext.role === 'auditor') ? (
                        <div className="panel-card">
                            <div className="panel-card-header">
                                <h3><LucideIcon iconName="history" /> Immutable System Traffic Log</h3>
                            </div>
                            <div className="table-responsive-wrapper">
                                {isProcessingLogs ? (
                                    <div className="data-loading-state">
                                        <LucideIcon iconName="loader-2" customClass="spinner-animation" iconSize={32} /> 
                                        Structuring backend security trails...
                                    </div>
                                ) : (
                                    <table className="data-table">
                                        <thead>
                                            <tr>
                                                <th>Chronological Execution</th>
                                                <th>Executing Operator</th>
                                                <th>Subsystem Action</th>
                                                <th>Captured Properties</th>
                                                <th>Node Origination IP</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {securityLogs.length === 0 ? (
                                                <tr>
                                                    <td colSpan={5} style={{ textAlign: 'center', padding: '3rem', color: '#64748B' }}>
                                                        The active node log registers no history matching criteria.
                                                    </td>
                                                </tr>
                                            ) : (
                                                securityLogs.map((logEntry, indexPointer) => (
                                                    <tr key={indexPointer}>
                                                        <td style={{ fontSize: '0.85rem', color: '#64748B', whiteSpace: 'nowrap', fontWeight: 500 }}>
                                                            {formatDisplayTimestamp(logEntry.created_at)}
                                                        </td>
                                                        <td>
                                                            <b style={{ fontSize: '0.9rem', color: '#0F172A' }}>
                                                                {logEntry.full_name || logEntry.user_id}
                                                            </b>
                                                        </td>
                                                        <td>
                                                            <span className="status-badge type-active" style={{ fontSize: '0.75rem' }}>
                                                                {logEntry.action}
                                                            </span>
                                                        </td>
                                                        <td style={{ fontSize: '0.85rem', color: '#475569' }}>
                                                            {logEntry.detail}
                                                        </td>
                                                        <td style={{ fontSize: '0.8rem', color: '#94A3B8', fontFamily: 'monospace' }}>
                                                            {logEntry.ip_address}
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    ) : (
                        <div style={{ 
                            background: '#FEFCE8', border: '1px solid #FEF08A', borderRadius: 16, 
                            padding: '2rem', textAlign: 'center', color: '#A16207', fontWeight: 600, 
                            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' 
                        }}>
                            <LucideIcon iconName="shield-alert" iconSize={48} inlineStyles={{ color: '#CA8A04' }} />
                            <span style={{ fontSize: '1.1rem' }}>Restricted Operational Sector</span>
                            <span style={{ fontSize: '0.9rem', color: '#854D0E' }}>
                                Decryption and viewing of traffic intelligence demands direct Administrator or Auditor clearance variables.
                            </span>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        // ── CORE: Main Router Application Wrapper ─────────────────────
        function SystemInterfaceApp() {
            const [activeRoutePath, setActiveRoutePath] = useState('dashboard');
            const [verifiedUserContext] = useState(fetchUserData());
            const [notificationQueue, setNotificationQueue] = useState([]);
            const [isBlockchainVerified, setIsBlockchainVerified] = useState(true);

            useEffect(() => {
                // Confirm valid authorization context exists
                if (!localStorage.getItem('jigawa_token')) {
                    window.location.href = '/';
                    return;
                }
                
                // Establish initial integrity check logic
                performApiRequest('/blockchain/validate').then(diagnosisResponse => {
                    if (diagnosisResponse) {
                        setIsBlockchainVerified(diagnosisResponse.valid);
                    }
                });
            }, []);

            // Toast Management System
            function pushSystemNotification(messageOutput, severityState = 'toast-info', graphicSymbol = 'info') {
                const uniqueDispatchId = Date.now();
                setNotificationQueue(previousQueue => [
                    ...previousQueue, 
                    { id: uniqueDispatchId, messageText: messageOutput, alertType: severityState, iconSymbol: graphicSymbol }
                ]);
                
                setTimeout(() => {
                    setNotificationQueue(previousQueue => previousQueue.filter(messageItem => messageItem.id !== uniqueDispatchId));
                }, 4000);
            }

            function processLogoutDestruction() {
                performApiRequest('/auth/logout', 'POST', {});
                localStorage.clear();
                window.location.href = '/';
            }

            const sidebarNavigationMatrix = [
                { id: 'dashboard', label: 'Primary Dashboard', icon: 'layout-dashboard' },
                { id: 'assets', label: 'Asset Management', icon: 'landmark' },
                { id: 'blockchain', label: 'Decentralized Network', icon: 'link' },
                { id: 'reports', label: 'Compliance Reports', icon: 'clipboard-list' },
            ];

            const internalPageTitles = {
                dashboard: 'System Overview & Analytics',
                assets: 'Official Ledger Directory',
                blockchain: 'JIGAWA-MAINNET Topology',
                reports: 'Investigation & Audit Diagnostics'
            };

            return (
                <div className="app-layout">
                    
                    {/* Fixed Navigation Sidebar */}
                    <aside className="sidebar-navigation">
                        <div className="sidebar-header">
                            <div className="sidebar-logo-group">
                                <div className="sidebar-icon-box">
                                    <LucideIcon iconName="shield-check" iconSize={24} />
                                </div>
                                <div>
                                    <div className="sidebar-title">State Registry</div>
                                    <div className="sidebar-subtitle">Operational Control</div>
                                </div>
                            </div>
                        </div>
                        
                        <nav className="navigation-links">
                            <div className="navigation-category-label">Operational Menu</div>
                            {sidebarNavigationMatrix.map(navElement => (
                                <button 
                                    key={navElement.id} 
                                    className={'nav-button-item' + (activeRoutePath === navElement.id ? ' is-active' : '')} 
                                    onClick={() => setActiveRoutePath(navElement.id)}
                                >
                                    <span className="nav-button-icon">
                                        <LucideIcon iconName={navElement.icon} iconSize={18} />
                                    </span>
                                    {navElement.label}
                                    
                                    {/* Security Exception Red Badge Injection */}
                                    {navElement.id === 'blockchain' && !isBlockchainVerified && (
                                        <span className="alert-indicator-badge">
                                            <LucideIcon iconName="alert-triangle" iconSize={12} />
                                        </span>
                                    )}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="user-profile-section">
                            <div className="user-avatar-circle">
                                {(verifiedUserContext.full_name || 'U').charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <div className="user-name-text">{verifiedUserContext.full_name || verifiedUserContext.username}</div>
                                <div className="user-role-text">{verifiedUserContext.role || 'viewer'} · {verifiedUserContext.department || ''}</div>
                            </div>
                            <button className="btn-system-logout" onClick={processLogoutDestruction} title="Secure Server Exit">
                                <LucideIcon iconName="log-out" iconSize={18} />
                            </button>
                        </div>
                    </aside>

                    {/* Operational Workspace Viewport */}
                    <main className="main-workspace">
                        <div className="workspace-topbar">
                            <h2>{internalPageTitles[activeRoutePath]}</h2>
                            <div className="topbar-control-group">
                                <div className="system-health-badge">
                                    <div className="pulse-indicator" />
                                    {isBlockchainVerified ? 'Cryptographically Verified' : 'Critical Integrity Alert'}
                                </div>
                                <span style={{ fontSize: '0.82rem', color: 'var(--slate-700)', fontWeight: 500, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                    <LucideIcon iconName="user-circle" iconSize={18} /> 
                                    Logged as: {verifiedUserContext.full_name || verifiedUserContext.username}
                                </span>
                            </div>
                        </div>
                        
                        <div className="content-canvas">
                            {activeRoutePath === 'dashboard' && <RouteDashboard triggerToast={pushSystemNotification} />}
                            {activeRoutePath === 'assets' && <RouteAssets triggerToast={pushSystemNotification} currentUserSession={verifiedUserContext} />}
                            {activeRoutePath === 'blockchain' && <RouteChainExplorer triggerToast={pushSystemNotification} />}
                            {activeRoutePath === 'reports' && <RouteReports triggerToast={pushSystemNotification} currentUserContext={verifiedUserContext} />}
                        </div>
                    </main>

                    {/* Global Overlays */}
                    <NotificationSystem notifications={notificationQueue} />
                </div>
            );
        }

        // Application Render Injection
        const DOMContainer = document.getElementById('react-application-root');
        const rootEngine = ReactDOM.createRoot(DOMContainer);
        rootEngine.render(<SystemInterfaceApp />);
    </script>
</body>
</html>
